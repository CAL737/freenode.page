<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免费高速VPN节点，1000Mbps带宽，永不失效</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        .flash-container {
            text-align: center;
            animation: flash 0.1s infinite;
        }

        @keyframes flash {
            0% { 
                color: #ff0000; 
                text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
                background: #000;
            }
            25% { 
                color: #00ff00; 
                text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
                background: #1a1a1a;
            }
            50% { 
                color: #0000ff; 
                text-shadow: 0 0 20px #0000ff, 0 0 40px #0000ff;
                background: #000;
            }
            75% { 
                color: #ffff00; 
                text-shadow: 0 0 20px #ffff00, 0 0 40px #ffff00;
                background: #1a1a1a;
            }
            100% { 
                color: #ff00ff; 
                text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
                background: #000;
            }
        }

        h1 {
            font-size: 4em;
            font-weight: bold;
            animation: shake 0.5s infinite, scale 0.3s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-2deg); }
            75% { transform: translateX(10px) rotate(2deg); }
        }

        @keyframes scale {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 1.5em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
        }

        .start-btn:hover {
            background: #764ba2;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .hidden {
            display: none;
        }

        /* 背景闪烁效果 */
        .bg-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            animation: bgFlash 0.15s infinite;
        }

        @keyframes bgFlash {
            0% { background: #ff0000; }
            20% { background: #00ff00; }
            40% { background: #0000ff; }
            60% { background: #ffff00; }
            80% { background: #ff00ff; }
            100% { background: #00ffff; }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <button class="start-btn" id="startBtn">点击开始</button>
    
    <div class="content hidden" id="content">
        <div class="bg-flash"></div>
        <div class="flash-container">
            <h1>想啥呢，根本就没有免费的节点</h1>
        </div>
    </div>

    <!-- 替换成你的音乐文件链接 -->
    <audio id="bgMusic" loop>
        <source src="https://kw-er.kuwo.cn/9a844ae5198d3241dc51740cd4cb95b8/6a539507/resource/30106/trackmedia/M500002Z6Nqx34XLgt.mp3?bitrate$128&from=vip" type="audio/mpeg">
    </audio>

    <script>
        const startBtn = document.getElementById('startBtn');
        const content = document.getElementById('content');
        const bgMusic = document.getElementById('bgMusic');

        startBtn.addEventListener('click', function() {
            startBtn.classList.add('hidden');
            content.classList.remove('hidden');
            
            // 播放音乐
            bgMusic.play().catch(function(error) {
                console.log('音频播放失败:', error);
            });

            // 全屏效果（可选）
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        });

        // 防止右键菜单
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
