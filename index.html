<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免费高速VPN节点，1000Mbps带宽，永不失效</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505; /* 深色背景 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Microsoft YaHei", "Heiti SC", sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        /* 核心文字样式 */
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            /* 多重阴影实现发光效果 */
            text-shadow: 
                0 0 10px #00e6e6,
                0 0 20px #00e6e6,
                0 0 40px #00e6e6,
                0 0 80px #00e6e6,
                0 0 120px #00e6e6;
            animation: breathe 3s infinite ease-in-out;
            line-height: 1.4;
        }

        /* 呼吸灯动画：让光晕忽明忽暗 */
        @keyframes breathe {
            0%, 100% {
                opacity: 1;
                text-shadow: 
                    0 0 10px #00e6e6,
                    0 0 20px #00e6e6,
                    0 0 40px #00e6e6,
                    0 0 80px #00e6e6;
            }
            50% {
                opacity: 0.8;
                text-shadow: 
                    0 0 5px #00e6e6,
                    0 0 10px #00e6e6,
                    0 0 20px #00e6e6,
                    0 0 40px #00e6e6;
            }
        }

        /* 开始按钮样式 */
        .start-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: transparent;
            color: #00e6e6;
            border: 2px solid #00e6e6;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 230, 230, 0.3);
        }

        .start-btn:hover {
            background: #00e6e6;
            color: #000;
            box-shadow: 0 0 20px #00e6e6;
        }

        .hidden {
            display: none !important;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- 开始按钮 -->
    <button class="start-btn" id="startBtn">点击开始享受翻墙人生</button>

    <!-- 主要内容区域 -->
    <div class="container hidden" id="content">
        <h1>想啥呢<br>根本就没有免费的节点</h1>
    </div>
    <script>
        const startBtn = document.getElementById('startBtn');
        const content = document.getElementById('content');
        const bgMusic = document.getElementById('bgMusic');

        startBtn.addEventListener('click', () => {
            // 隐藏按钮，显示文字
            startBtn.classList.add('hidden');
            content.classList.remove('hidden');

            // 尝试播放音乐
            bgMusic.play().catch(err => {
                console.log("自动播放被拦截，请检查浏览器设置", err);
            });
        });
    </script>
</body>
</html>
