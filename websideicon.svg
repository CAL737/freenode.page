<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 定义发光滤镜 -->
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- 深色背景，确保在浅色标签页也能看清 -->
  <rect width="64" height="64" rx="12" fill="#0a0a0a" />
  
  <!-- 盾牌 + 闪电 组合路径，应用青色霓虹发光 -->
  <g filter="url(#neon-glow)" fill="none" stroke="#00e6e6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 盾牌轮廓 -->
    <path d="M32 8 L52 18 L52 34 C52 46 42 56 32 58 C22 56 12 46 12 34 L12 18 Z" />
    <!-- 闪电路径 -->
    <path d="M36 14 L24 32 L32 32 L28 50 L44 28 L34 28 Z" fill="#00e6e6" stroke="none" opacity="0.9"/>
  </g>
</svg>